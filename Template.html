<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Template</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #FFF8DC; /* 米黄色背景 */
            color: #000; /* 纯黑文字 */
        }
        h1 {
            font-size: 30px; /* 标题30 */
            margin: 0 0 10px 0;
        }
        hr {
            border: none;
            border-top: 1px solid #000; /* 纯黑分割线 */
            margin: 20px 0;
        }
        p {
            font-size: 20px; /* 正文20 */
            line-height: 1.6;
            margin: 0;
        }
    </style>
</head>
<body>

    <h1>这里是主标题</h1>
    <hr>
    <p>这里是正文内容。这是一段示例文本，用于展示模板的排版效果。字体大小为20px，背景为米黄色，文字为纯黑。</p>

    <script>
        // JS 已引入，保持安静
    </script>
</body>
</html>
